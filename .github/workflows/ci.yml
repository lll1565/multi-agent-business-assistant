name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/backend src/subagent tests

      - name: Ruff format
        run: ruff format --check src/backend src/subagent tests

      - name: Mypy
        run: |
          mypy backend
          mypy src/subagent/stone/routing/registry.py src/subagent/stone/routing/classifier.py src/subagent/stone/routing/routing_intents.py src/subagent/stone/routing/routing_types.py src/subagent/stone/routing/api_fastpath.py src/subagent/stone/persistence/checkpointer.py src/subagent/stone/routing/hard_route.py src/subagent/stone/routing/resolve_route.py src/subagent/stone/runtime/core.py src/subagent/stone/runtime/turn_runner.py

      - name: Import linter
        run: lint-imports

      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Vitest
        working-directory: frontend
        run: npm run test
