services:
  app:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      APP_ENV: production
      SERVE_FRONTEND: "true"
      LOG_FORMAT: json
      UVICORN_HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/ready', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
